services:
  postgres:
    build: ./services/postgres
    container_name: cdn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cdn_db}
      POSTGRES_USER: ${POSTGRES_USER:-cdn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdn_secure_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cdn-network

  api:
    build: ./services/api
    container_name: cdn-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - API_PORT=${API_PORT:-3000}
      - API_KEY=${API_KEY:-mysecretkey}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - ADMIN_SETUP_KEY=${ADMIN_SETUP_KEY:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-cdn_db}
      - POSTGRES_USER=${POSTGRES_USER:-cdn_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cdn_secure_password_2024}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-104857600}
      - ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS:-.jpg,.jpeg,.png,.gif,.webp,.pdf,.zip,.mp4,.mp3,.txt,.json,.css,.html}
      - TOKEN_EXPIRY_HOURS=${TOKEN_EXPIRY_HOURS:-24}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - CLEANUP_INTERVAL_MS=${CLEANUP_INTERVAL_MS:-3600000}
    volumes:
      - uploads_data:/app/uploads
      - api_logs:/app/logs
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - cdn-network

  dashboard:
    build: ./cdn-dashboard
    container_name: cdn-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_CDN_URL=${CDN_URL:-http://localhost:8899}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cdn-network

  nginx:
    build: ./services/nginx
    container_name: cdn-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8899}:80"
    volumes:
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cdn-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  cdn-network:
    driver: bridge
